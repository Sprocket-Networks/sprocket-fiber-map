    }
    #map {

    }

      background: white; border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);

    }
    .legend-item {
      display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
    }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-line {
      width: 20px; height: 3px; border-radius: 2px; flex-shrink: 0;
    }
    .leaflet-popup-content h3 {
      margin: 0 0 4px; font-size: 14px; color: #0f172a;
    }
    .leaflet-popup-content p {
      margin: 0 0 10px; font-size: 12px; color: #475569;
    }
    .popup-btn {
      display: inline-block; padding: 6px 12px;
      background: #0f172a; color: white;
      border-radius: 5px; font-size: 12px; font-weight: 500;
      text-decoration: none;
    }
    .popup-btn:hover { background: #1e293b; }
    #layer-toggle {
      position: fixed; bottom: 24px; right: 16px; z-index: 1000;
      background: white; border-radius: 8px;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);

      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .completeness-legend:last-child { margin-bottom: 0; }
    .c-swatch {

    }

    // Fit map to show all network layers
    var allBounds = fwfLayer.getBounds();
    if (dalLayer.getLayers().length) allBounds.extend(dalLayer.getBounds());
    if (dalDeLayer.getLayers().length) allBounds.extend(dalDeLayer.getBounds());
    map.fitBounds(allBounds.pad(0.05));

    // ---- County completeness choropleth ----

    var COMPLETENESS_COLORS = ['#e2e8f0','#fef3c7','#fde68a','#86efac','#22c55e'];
    var completenessLayer = null;

    function completenessStyle(feature) {
      var lvl = feature.properties.completeness_level || 0;
      return {
        fillColor: COMPLETENESS_COLORS[Math.min(lvl, 4)],
        fillOpacity: 0.55,
        color: '#94a3b8',
        weight: 1
      };
    }

    function onEachCounty(feature, layer) {
      var p = feature.properties;
      var fwaLine = p.has_fwa > 0 ? '<br>FWA-tagged: ' + p.has_fwa.toLocaleString() : '';
      layer.bindPopup(
        '<h3>' + p.label + '</h3>' +
        '<p style="margin:0;font-size:12px;color:#475569">' +
        'Locations: ' + (p.total_locs||0).toLocaleString() +
        '<br>Residential: ' + (p.residential_locs||0).toLocaleString() +
        '<br>Business/other: ' + (p.business_locs||0).toLocaleString() +
        '<br>Completeness level: ' + p.completeness_level +
        (p.has_cad > 0 ? '<br>CAD-enriched: ' + p.has_cad.toLocaleString() : '') +
        (p.has_costar > 0 ? '<br>CoStar-enriched: ' + p.has_costar.toLocaleString() : '') +
        fwaLine +
        '</p>'
      );
    }

    fetch('county_completeness.geojson')
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) return;
        completenessLayer = L.geoJSON(data, {
          style: completenessStyle,
          onEachFeature: onEachCounty
        }).addTo(map);
        completenessLayer.bringToBack();

        document.getElementById('completeness-toggle').addEventListener('change', function() {
          if (this.checked) { completenessLayer.addTo(map); completenessLayer.bringToBack(); }
          else { map.removeLayer(completenessLayer); }
        });
      })
      .catch(function() {});
  </script>
</body>
</html>

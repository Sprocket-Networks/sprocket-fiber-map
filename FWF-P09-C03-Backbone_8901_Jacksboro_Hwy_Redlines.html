// Interpolation — uses KMZ route geometry + Haversine distance for road-following placement
function haversine(p1,p2){const R=20902231;const toRad=x=>x*Math.PI/180;const dLat=toRad(p2[0]-p1[0]);const dLon=toRad(p2[1]-p1[1]);const a=Math.sin(dLat/2)**2+Math.cos(toRad(p1[0]))*Math.cos(toRad(p2[0]))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
const routeDists=[0];
for(let i=1;i<route.length;i++) routeDists.push(routeDists[i-1]+haversine(route[i-1],route[i]));
const totalRouteDist=routeDists[routeDists.length-1];
const totalStaFeet=15570; // STA 155+70
function iPos(feet){
  const targetDist=(feet/totalStaFeet)*totalRouteDist;
  for(let i=0;i<routeDists.length-1;i++){
    if(targetDist>=routeDists[i]&&targetDist<=routeDists[i+1]){
      const segLen=routeDists[i+1]-routeDists[i];
      const t=segLen>0?(targetDist-routeDists[i])/segLen:0;
      return[route[i][0]+t*(route[i+1][0]-route[i][0]),route[i][1]+t*(route[i+1][1]-route[i][1])];
    }
  }
  return route[route.length-1];
}

// CP03 HLD routes (highlighted)

  pop+='<div class="row"><span class="lbl">BOC</span><span class="val">'+(s.boc||'?')+'</span></div>';
  pop+='<div class="row"><span class="lbl">Contractor</span><span class="val">'+SRC.constructor+'</span></div>';
  pop+='<div class="row"><span class="lbl">Const Mgr</span><span class="val">'+SRC.constMgr+'</span></div>';
  pop+='<div class="src">File: '+SRC.filename+'<br>Page: '+s.page+'<br>Source: Redline annotation<br>Design Date: '+SRC.designDate+'<br>Construction: '+SRC.constDate+'</div></div>';
  L.circleMarker(pos,{radius:3,fillColor:'#10b981',color:'#065f46',weight:1,fillOpacity:0.7}).bindPopup(pop).addTo(asbuiltBOCGroup);
});


// ============================================================
// REDLINE PAGE MARKERS — clickable page locations on map
// ============================================================
const pageMarkersGroup = L.layerGroup();

// Build page boundaries from station data
const pageStations = {};
asbuiltStations.forEach(s => {
  if (!pageStations[s.page]) pageStations[s.page] = {min: s.feet, max: s.feet, minSta: s.sta, maxSta: s.sta};
  if (s.feet < pageStations[s.page].min) { pageStations[s.page].min = s.feet; pageStations[s.page].minSta = s.sta; }
  if (s.feet > pageStations[s.page].max) { pageStations[s.page].max = s.feet; pageStations[s.page].maxSta = s.sta; }
});

// Create a marker for each page — prefer GPS waypoints, fall back to interpolated midpoint
const usedPages = new Set();

// First, place markers at GPS waypoint locations (most accurate)
gpsData.forEach(g => {
  usedPages.add(g.page);
  const pgInfo = pageStations[g.page] || {};
  const staRange = pgInfo.minSta && pgInfo.maxSta ? 
    'STA ' + pgInfo.minSta + ' → ' + pgInfo.maxSta : (g.sta_range || '');
  const stationCount = asbuiltStations.filter(s => s.page === g.page).length;
  
  const icon = L.divIcon({
    className: 'page-marker-icon',
    html: '<div class="page-marker">p' + g.page + '</div>',
    iconSize: [28, 20],
    iconAnchor: [14, 10]
  });
  
  let pop = '<div class="pop"><div class="hdr">Redline Page ' + g.page + '</div>';
  pop += '<div class="row"><span class="lbl">Stations</span><span class="val">' + staRange + '</span></div>';
  pop += '<div class="row"><span class="lbl">Data Pts</span><span class="val">' + stationCount + ' stations</span></div>';
  pop += '<div class="row"><span class="lbl">GPS</span><span class="val">' + g.lat.toFixed(6) + ', ' + g.lon.toFixed(6) + '</span></div>';
  pop += '<div class="src">File: ' + SRC.filename + '<br>Source: GPS waypoint</div></div>';
  
  L.marker([g.lat, g.lon], {icon: icon}).bindPopup(pop).addTo(pageMarkersGroup);
});

// Then fill in pages that have station data but no GPS waypoint
Object.keys(pageStations).forEach(pg => {
  const pageNum = parseInt(pg);
  if (usedPages.has(pageNum)) return;
  
  const info = pageStations[pageNum];
  const midFeet = Math.round((info.min + info.max) / 2);
  const pos = iPos(midFeet);
  const stationCount = asbuiltStations.filter(s => s.page === pageNum).length;
  
  const icon = L.divIcon({
    className: 'page-marker-icon',
    html: '<div class="page-marker page-interp">p' + pageNum + '</div>',
    iconSize: [28, 20],
    iconAnchor: [14, 10]
  });
  
  let pop = '<div class="pop"><div class="hdr">Redline Page ' + pageNum + '</div>';
  pop += '<div class="row"><span class="lbl">Stations</span><span class="val">STA ' + info.minSta + ' → ' + info.maxSta + '</span></div>';
  pop += '<div class="row"><span class="lbl">Data Pts</span><span class="val">' + stationCount + ' stations</span></div>';
  pop += '<div class="row"><span class="lbl">Position</span><span class="val">Interpolated (midpoint)</span></div>';
  pop += '<div class="src">File: ' + SRC.filename + '<br>Source: Interpolated from station range</div></div>';
  
  L.marker(pos, {icon: icon}).bindPopup(pop).addTo(pageMarkersGroup);
});

// CFW

// ============================================================
// CUSTOM LAYER PANEL
// ============================================================
const tiers = {
  hld: {
    label: 'HLD \u2014 Original Design (Nov 2025)',
    cssClass: 'hld',
    children: [

// Build the panel
const panel = L.control({position: 'topright'});
panel.onAdd = function() {
  const div = L.DomUtil.create('div', 'layer-panel');
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);

  Object.entries(tiers).forEach(([key, tier]) => {
    const section = document.createElement('div');
    section.className = 'lp-section';

    const header = document.createElement('div');
    header.className = 'lp-header ' + tier.cssClass;
    const masterCb = document.createElement('input');
    masterCb.type = 'checkbox';
    masterCb.checked = true;
    masterCb.id = 'master-' + key;
    header.appendChild(masterCb);
    const headerLabel = document.createElement('span');
    headerLabel.textContent = tier.label;
    header.appendChild(headerLabel);
    section.appendChild(header);

    const childDiv = document.createElement('div');
    childDiv.className = 'lp-children';

    tier.children.forEach((child, idx) => {
      const row = document.createElement('div');
      row.className = 'lp-child';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = child.on;
      cb.id = key + '-' + idx;
      cb.dataset.tierKey = key;
      const lbl = document.createElement('label');
      lbl.htmlFor = cb.id;
      lbl.textContent = child.label;
      row.appendChild(cb);
      row.appendChild(lbl);
      childDiv.appendChild(row);

      if (child.on) map.addLayer(child.layer);

      cb.addEventListener('change', function() {
        if (this.checked) map.addLayer(child.layer);
        else map.removeLayer(child.layer);
        const allChecked = tier.children.every((c,i) => document.getElementById(key+'-'+i).checked);
        const anyChecked = tier.children.some((c,i) => document.getElementById(key+'-'+i).checked);
        masterCb.checked = anyChecked;
        masterCb.indeterminate = anyChecked && !allChecked;
      });
    });

    section.appendChild(childDiv);
    div.appendChild(section);

    masterCb.addEventListener('change', function() {
      tier.children.forEach((child, idx) => {
        const cb = document.getElementById(key + '-' + idx);
        cb.checked = masterCb.checked;
        if (masterCb.checked) { if (!map.hasLayer(child.layer)) map.addLayer(child.layer); }
        else { if (map.hasLayer(child.layer)) map.removeLayer(child.layer); }
      });
      masterCb.indeterminate = false;
    });
  });

  return div;
};
panel.addTo(map);

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const ALLOWED_DOMAINS = ["sprocketnetworks.com", "lassobroadband.com", "digitalalpha.ai", "ntxcom.com"];

function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const jsonPayload = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(jsonPayload);
}

function handleCredentialResponse(response) {
  const payload = parseJwt(response.credential);
  const email = payload.email || '';
  const domain = email.split('@')[1] || '';
  
  if (ALLOWED_DOMAINS.includes(domain)) {
    // Auth success
    document.getElementById('auth-gate').classList.add('hidden');
    document.getElementById('auth-user').textContent = email;
    try { localStorage.setItem('fwf_auth', JSON.stringify({email: email, exp: payload.exp, token: response.credential})); } catch(e) {}
  } else {
    const errEl = document.getElementById('auth-error');
    errEl.style.display = 'block';
    errEl.textContent = 'Access denied: ' + domain + ' is not an authorized domain.';
  }
}

// Check for existing valid auth
(function() {
  try {
    const stored = JSON.parse(localStorage.getItem('fwf_auth') || '{}');
    if (stored.email && stored.exp && (stored.exp * 1000) > Date.now()) {
      document.getElementById('auth-gate').classList.add('hidden');
      document.getElementById('auth-user').textContent = stored.email;
    }
  } catch(e) {}
})();
</script>

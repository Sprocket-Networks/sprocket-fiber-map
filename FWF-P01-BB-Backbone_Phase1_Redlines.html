  checkbox.addEventListener('change', function() {
    if (this.checked) map.addLayer(layer); else map.removeLayer(layer);
  });
}

    '<div class="legend-item"><div class="page-marker" style="font-size:9px;margin-right:6px">p16</div>PDF Page Marker</div>';
  return div;
};
legend.addTo(map);

// ========== INFO PANEL ==========
var info = L.control({position: 'bottomleft'});
info.onAdd = function() {
  var div = L.DomUtil.create('div', 'info');
  div.innerHTML = '<h4>CFW Backbone Phase 1</h4>' +
    '<div class="stat"><span>Package</span><span class="stat-val">' + PKG_NAME + '</span></div>' +
    '<div class="stat"><span>Handholes</span><span class="stat-val">' + asBuiltHH.length + '</span></div>' +
    '<div class="stat"><span>Bore Segments</span><span class="stat-val">' + plannedSegments.length + '</span></div>' +
    '<div class="stat"><span>GPS Measured</span><span class="stat-val">' + asBuiltHH.filter(h => h.src==='measured').length + '</span></div>' +
    '<div class="stat"><span>GPS Interpolated</span><span class="stat-val">' + asBuiltHH.filter(h => h.src==='interpolated').length + '</span></div>' +
    '<div class="stat"><span>Depth/BOC</span><span class="stat-val">Pending (bore logs)</span></div>' +
    '<div class="src-box">Source: ' + PDF_FILE + '<br>Designer: ' + DESIGNER + '<br>Date: ' + DWG_DATE + '<br>Note: Depth/BOC data requires bore log processing</div>';
  return div;
};
info.addTo(map);

// Fit map to route bounds
map.fitBounds(L.polyline(asBuiltRoute).getBounds().pad(0.1));

// ========== GOOGLE AUTH ==========
function handleCredentialResponse(response) {
  var base64Url = response.credential.split('.')[1];
  var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  var payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join('')));
  var email = payload.email || '';
  var domain = email.split('@')[1] || '';
  var allowed = ['sprocketnetworks.com','lassobroadband.com','digitalalpha.ai','ntxcom.com'];
  if (allowed.indexOf(domain) !== -1) {
    document.getElementById('auth-gate').classList.add('hidden');
    document.getElementById('auth-user').textContent = email;
    setTimeout(function(){ map.invalidateSize(); }, 200);
  } else {
    var err = document.getElementById('auth-error');
    err.style.display = 'block';
    err.textContent = 'Access denied: ' + domain + ' is not authorized.';
  }
}
</script>

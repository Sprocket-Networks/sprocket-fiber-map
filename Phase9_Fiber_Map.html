).addTo(map);

// Sync parent toggles with children
map.on('overlayadd', function(e) {
  if (e.name === '\u25B6 ALL PLANNED') {
    plannedChildren.forEach(l => { if (!map.hasLayer(l)) map.addLayer(l); });
  }
  if (e.name === '\u25B6 ALL AS-BUILT') {
    asbuiltChildren.forEach(l => { if (!map.hasLayer(l)) map.addLayer(l); });
  }
});
map.on('overlayremove', function(e) {
  if (e.name === '\u25B6 ALL PLANNED') {
    plannedChildren.forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  }
  if (e.name === '\u25B6 ALL AS-BUILT') {
    asbuiltChildren.forEach(l => { if (map.hasLayer(l)) map.removeLayer(l); });
  }
});

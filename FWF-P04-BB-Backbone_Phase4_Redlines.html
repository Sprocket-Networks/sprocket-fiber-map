  plannedHHGroup.addLayer(m);

plannedGroup.addLayer(plannedRouteGroup);
plannedGroup.addLayer(plannedHHGroup);
plannedGroup.addTo(map);

// ========== PAGE MARKERS ==========
var pageMarkerGroup = L.layerGroup();
pageMarkers.forEach(function(pm) {

// ========== LAYER PANEL ==========
var layerControl = L.control({position: 'topright'});
layerControl.onAdd = function() {
  var div = L.DomUtil.create('div', 'layer-panel');
  div.innerHTML = '<div class="lp-section">' +
    '<div class="lp-header planned"><input type="checkbox" id="lp-planned" checked> Planned (Design)</div>' +
    '<div class="lp-children">' +
    '<div class="lp-child"><input type="checkbox" id="lp-planned-route" checked><label for="lp-planned-route">Route</label></div>' +
    '<div class="lp-child"><input type="checkbox" id="lp-planned-hh" checked><label for="lp-planned-hh">Handholes</label></div>' +
    '</div></div>' +
    '<div class="lp-section">' +
    '<div class="lp-header asbuilt"><input type="checkbox" id="lp-ab" checked> As-Built (Redline)</div>' +
    '<div class="lp-children">' +
    '<div class="lp-child"><input type="checkbox" id="lp-ab-route" checked><label for="lp-ab-route">Route</label></div>' +

    '</div></div>' +
    '<div class="lp-section">' +
    '<div class="lp-header other"><input type="checkbox" id="lp-pages" checked> Page Markers</div>' +

  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  return div;
};
layerControl.addTo(map);

function toggleLayer(checkbox, layer) {
  checkbox.addEventListener('change', function() {
    if (this.checked) map.addLayer(layer); else map.removeLayer(layer);
  });
}
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    toggleLayer(document.getElementById('lp-planned'), plannedGroup);
    toggleLayer(document.getElementById('lp-planned-route'), plannedRouteGroup);
    toggleLayer(document.getElementById('lp-planned-hh'), plannedHHGroup);
    toggleLayer(document.getElementById('lp-ab'), asBuiltGroup);
    toggleLayer(document.getElementById('lp-ab-route'), abRouteGroup);
    toggleLayer(document.getElementById('lp-ab-hh'), abHHGroup);
    toggleLayer(document.getElementById('lp-pages'), pageMarkerGroup);

    var plannedCheck = document.getElementById('lp-planned');
    plannedCheck.addEventListener('change', function() {
      document.getElementById('lp-planned-route').checked = this.checked;
      document.getElementById('lp-planned-hh').checked = this.checked;
    });
    var abCheck = document.getElementById('lp-ab');
    abCheck.addEventListener('change', function() {
      document.getElementById('lp-ab-route').checked = this.checked;
      document.getElementById('lp-ab-hh').checked = this.checked;
    });
  }, 100);
});

// ========== GOOGLE AUTH ==========
function handleCredentialResponse(response) {
  var base64Url = response.credential.split('.')[1];
  var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  var payload = JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c) {
    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
  }).join('')));
  var domain = payload.hd || '';
  var allowed = ['sprocketnetworks.com', 'lassobroadband.com', 'digitalalpha.ai', 'ntxcom.com'];
  if (allowed.indexOf(domain) === -1) {
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = 'Access denied. Use a ' + allowed.join(', ') + ' email.';
    return;
  }
  document.getElementById('auth-gate').classList.add('hidden');
  document.getElementById('auth-user').textContent = payload.email;
  map.invalidateSize();
}

const cfwCats = {fire:{c:'#dc2626',l:'Fire',s:'<path d="M12 2C10 6 6 8 6 13a6 6 0 0012 0c0-5-4-7-6-11z" fill="#dc2626"/><circle cx="12" cy="14" r="2" fill="#fef2f2"/>'},parks:{c:'#16a34a',l:'Parks',s:'<path d="M12 3c-2 3-6 4-6 8a6 6 0 004 5.7V20h4v-3.3A6 6 0 0018 11c0-4-4-5-6-8z" fill="#16a34a"/><rect x="11" y="16" width="2" height="6" fill="#854d0e"/>'},police:{c:'#2563eb',l:'Police',s:'<path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" fill="#2563eb"/><path d="M10 12l2 2 4-4" stroke="#fff" stroke-width="2" fill="none"/>'},library:{c:'#9333ea',l:'Library',s:'<path d="M4 19V5a2 2 0 012-2h8a2 2 0 012 2v14" fill="none" stroke="#9333ea" stroke-width="2"/><path d="M4 19h12M8 3v16" stroke="#9333ea" stroke-width="2"/><rect x="17" y="7" width="3" height="12" rx="1" fill="#9333ea"/>'},water:{c:'#0891b2',l:'Water',s:'<path d="M12 2c-3 4-7 6-7 11a7 7 0 0014 0c0-5-4-7-7-11z" fill="#0891b2"/>'},admin:{c:'#ca8a04',l:'Admin',s:'<path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm2-6v4h4V11H5zm6 0v4h4V11h-4zm6 0v4h4V11h-4zM4 9h16L12 3 4 9z" fill="#ca8a04"/>'},medical:{c:'#e11d48',l:'Medical',s:'<rect x="3" y="3" width="18" height="18" rx="3" fill="#e11d48"/><path d="M11 7h2v4h4v2h-4v4h-2v-4H7v-2h4V7z" fill="#fff"/>'},tower:{c:'#64748b',l:'Tower',s:'<path d="M12 2L8 10h3v10h2V10h3L12 2z" fill="#64748b"/>'},ops:{c:'#ea580c',l:'Ops',s:'<circle cx="12" cy="12" r="9" fill="#ea580c"/><circle cx="12" cy="12" r="3" fill="#fff7ed"/>'},animal:{c:'#a16207',l:'Animal',s:'<circle cx="12" cy="12" r="9" fill="#a16207"/><circle cx="9" cy="10" r="1.5" fill="#fefce8"/><circle cx="15" cy="10" r="1.5" fill="#fefce8"/>'},other:{c:'#6b7280',l:'Other',s:'<circle cx="12" cy="12" r="9" fill="#6b7280"/>'} };
function cfwIcon(cat) { const c=cfwCats[cat]||cfwCats.other; return L.divIcon({className:'cfw-icon',html:'<svg viewBox="0 0 24 24" width="28" height="28" xmlns="http://www.w3.org/2000/svg">'+c.s+'</svg>',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-14]}); }

// MAP
const cL = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20});
const cD = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:20});
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19});
const map = L.map('map',{layers:[cL]});

L.control.layers({"Street":cL,"Dark":cD,"Satellite":sat},{},{position:'topleft',collapsed:true}).addTo(map);

// CFW sites
const cfwGroup = L.layerGroup();
cfwSites.forEach(s=>{const m=L.marker([s.lat,s.lon],{icon:cfwIcon(s.cat)});const ci=cfwCats[s.cat]||cfwCats.other;m.bindPopup('<div class="cfw-popup"><div class="cfw-header">'+s.name+'</div><div class="cfw-cat" style="color:'+ci.c+'">'+ci.l+'</div><div class="cfw-row"><span class="cfw-label">Address</span><span class="cfw-value">'+s.addr+'</span></div></div>');cfwGroup.addLayer(m);});

// Track phase layer groups for toggling
const phaseLayers = {};
const allBounds = [];
let totalRoutes = 0;
let totalFeet = 0;
let totalCPs = 0;

// Draw all routes
Object.entries(phaseData).forEach(([phaseNum, phase]) => {
  const pNum = parseInt(phaseNum);
  const color = phaseColors[pNum] || '#6b7280';
  const group = L.layerGroup().addTo(map);
  phaseLayers[pNum] = group;

  phase.routes.forEach(r => {
    if (r.coords.length < 2) return;
    totalRoutes++;
    totalFeet += r.footage;

    // Check if this CP has a detail map
    const cpKey = r.cp;
    const cpStatus = statusMap[cpKey] || null;
    const hasDetail = cpStatus && cpStatus.url;

    const isBB = r.is_backbone;
    const style = {
      color: color,
      weight: isBB ? 5 : 3,
      opacity: 0.8,
      dashArray: isBB ? null : '8,4'
    };

    // Add invisible fat line for easier clicking
    const hitLine = L.polyline(r.coords, {color: color, weight: 15, opacity: 0});
    const line = L.polyline(r.coords, style);

    let pop = '<div class="pop"><div class="hdr">' + r.name + '</div>';
    pop += '<div class="row"><span class="lbl">Phase</span><span class="val">Phase ' + pNum + '</span></div>';
    pop += '<div class="row"><span class="lbl">Package</span><span class="val">' + r.cp + '</span></div>';
    pop += '<div class="row"><span class="lbl">Type</span><span class="val">' + (isBB ? 'Backbone' : 'Lateral') + '</span></div>';
    if (r.footage) pop += '<div class="row"><span class="lbl">Length</span><span class="val">' + r.footage.toLocaleString() + ' FT</span></div>';
    if (r.permit) pop += '<div class="row"><span class="lbl">Permit</span><span class="val">' + r.permit + '</span></div>';

    if (hasDetail) {
      pop += '<hr><a class="btn" href="javascript:void(0)" onclick="openDetail(\'' + cpStatus.url + '\',\'' + r.name.replace(/'/g,"\\'") + '\')">View Detail Map \u2192</a>';
    }

    pop += '</div>';
    line.bindPopup(pop);
    hitLine.bindPopup(pop);
    hitLine.addTo(group);
    line.addTo(group);

    r.coords.forEach(c => allBounds.push(c));
  });

  totalCPs += phase.cp_count;
});

// Build sidebar
const phaseList = document.getElementById('phaseList');
document.getElementById('totalSummary').innerHTML =
  totalRoutes + ' routes | ' + (totalFeet/5280).toFixed(0) + ' miles | ' + totalCPs + ' packages | 22 phases';

const phaseNums = Object.keys(phaseData).map(Number).sort((a,b) => a - b);
phaseNums.forEach(pNum => {
  const phase = phaseData[pNum];
  const color = phaseColors[pNum] || '#6b7280';

  // Determine best status for this phase
  let bestStatus = 'hld';
  phase.routes.forEach(r => {
    const s = statusMap[r.cp];
    if (s) {
      if (s.status === 'asbuilt' || s.status === 'reviewed') bestStatus = s.status;
      else if (s.status === 'planned' && bestStatus === 'hld') bestStatus = 'planned';
    }
  });

  const badgeClass = 'badge-' + bestStatus;
  const badgeText = bestStatus === 'hld' ? 'HLD Only' :
                    bestStatus === 'planned' ? 'Planned' :
                    bestStatus === 'asbuilt' ? 'As-Built' : 'Reviewed';

  // CPs with detail maps
  const detailCPs = phase.routes
    .filter(r => statusMap[r.cp] && statusMap[r.cp].url)
    .map(r => r.cp);
  const uniqueDetailCPs = [...new Set(detailCPs)];

  const card = document.createElement('div');
  card.className = 'phase-card';
  card.dataset.phase = pNum;
  card.innerHTML = `
    <div class="ph-header">
      <span class="ph-name" style="color:${color}">\u25CF Phase ${pNum}</span>
      <span class="ph-badge ${badgeClass}">${badgeText}</span>
    </div>
    <div class="ph-stats">${phase.routes.length} routes | ${(phase.total_feet/5280).toFixed(1)} mi | ${phase.cp_count} CPs</div>
    ${uniqueDetailCPs.length ? '<div class="ph-cp">' + uniqueDetailCPs.map(cp => {
      const s = statusMap[cp];
      return s && s.url ? '<a href="javascript:void(0)" style="color:#3b82f6;text-decoration:none;font-weight:600" onclick="event.stopPropagation();openDetail(\'' + s.url + '\',\'' + cp + '\')">' + cp + ' \u2192</a>' : cp;
    }).join(' &nbsp; ') + '</div>' : ''}
  `;

  card.addEventListener('click', () => {
    // Zoom to phase
    const phaseBounds = [];
    phase.routes.forEach(r => r.coords.forEach(c => phaseBounds.push(c)));
    if (phaseBounds.length) map.fitBounds(L.latLngBounds(phaseBounds).pad(0.1));
  });

  phaseList.appendChild(card);
});

// Search filter
function filterPhases(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.phase-card').forEach(card => {
    const text = card.textContent.toLowerCase();
    card.style.display = text.includes(q) ? '' : 'none';
  });
}

// Fit to all routes
if (allBounds.length) map.fitBounds(L.latLngBounds(allBounds).pad(0.05));
</script>
<!-- Detail map overlay -->
<div id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div id="detail-panel">
    <div id="detail-toolbar">
      <span id="detail-title"></span>
      <a id="detail-newwindow" href="#" target="_blank" title="Open in new tab">↗ New Tab</a>
      <button id="detail-close" onclick="closeDetail()">✕ Close</button>
    </div>
    <iframe id="detail-iframe" src="about:blank"></iframe>
  </div>
</div>
<script>
function openDetail(url, title) {
  document.getElementById('detail-title').textContent = title || 'Detail Map';
  document.getElementById('detail-newwindow').href = url;
  document.getElementById('detail-iframe').src = url;
  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-iframe').src = 'about:blank';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
</script>
